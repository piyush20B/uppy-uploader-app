<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language-selection</title>
    <link rel="stylesheet" href="/uppy/static/src/scss/uppy.main.css">
    <link rel="stylesheet" href="style.css">
</head>

<body data-uppy-theme="dark">

    <div class="languages" style="--w: 24rem;" id="languages-select">
        <div class="wrapper">
            <div class="lang-lhs">
                <div class="flag-lang">
                    <img src="/uppy/static/assets/flags/in.png" alt="india">
                </div>
                <p class="lang-name">en-IN</p>
            </div>
            <div class="vr"></div>
            <div class="lang-rhs">
                <div class="lang-svg-chevron">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon-sm" viewBox="0 0 512 512">
                        <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="32"
                            d="M48 112h288M192 64v48M272 448l96-224 96 224M301.5 384h133M281.3 112S257 206 199 277 80 384 80 384" />
                        <path d="M256 336s-35-27-72-75-56-85-56-85" fill="none" stroke="currentColor"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="32" />
                    </svg>
                </div>
            </div>
        </div>

    </div>

    <script src="/uppy/static/src/libs/js/code.jquery.com_jquery-3.7.0.js"></script>
    <script src="/uppy/static/src/libs/js/popper.min.js"></script>


</body>

</html>
