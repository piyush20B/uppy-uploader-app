<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language-selection</title>
    <link rel="stylesheet" href="/uppy/static/src/scss/uppy.main.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="languages" style="--w: 24rem;" id="languages-select">
        <div class="wrapper">
            <div class="lang-lhs">
                <div class="flag-lang">
                    <img src="/uppy/static/assets/flags/br.png" alt="india">
                </div>
                <p class="lang-name">en-IN</p>
            </div>
            <div class="vr"></div>
            <div class="lang-rhs">
                <div class="lang-svg-chevron">
                    <svg xmlns="http://www.w3.org/2000/svg" id="lang-dropdown-chevron" viewBox="0 0 512 512">
                        <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="48" d="M112 184l144 144 144-144" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="options-lang">
            <ul>
                <li>
                    <div class="lang-lhs">
                        <div class="flag-lang">
                            <img src="/uppy/static/assets/flags/br.png" alt="india">
                        </div>
                        <p class="lang-name">en-IN</p>
                    </div>
                </li>
            </ul>
        </div>
    </div>

    <script src="/uppy/static/src/libs/js/code.jquery.com_jquery-3.7.0.js"></script>

    <script>
        $('#languages-select').click(function () {
            $('#lang-dropdown-chevron').toggleClass('active');
        })
    </script>

</body>

</html>
