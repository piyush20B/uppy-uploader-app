<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language-selection</title>
    <link rel="stylesheet" href="/uppy/static/src/scss/uppy.main.css">
    <link rel="import" href="data.html">
</head>

<body>

    <div class="languages">
        <div class="wrapper">
            <div class="lang-lhs">
                <div class="flag-lang">
                    <img src="/uppy/static/assets/flags/in.png" alt="india">
                </div>
                <p class="lang-name">en-IN</p>
            </div>
            <div class="vr"></div>
            <div class="lang-rhs">
                <div class="lang-svg-chevron">
                    <svg xmlns="http://www.w3.org/2000/svg" class="ionicon" viewBox="0 0 512 512">
                        <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="48" d="M112 184l144 144 144-144" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script src="/uppy/static/src/libs/js/code.jquery.com_jquery-3.7.0.js"></script>

</body>

</html>
