<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uppy | {% block title %}{% endblock title %} </title>
    <link rel="shortcut icon" href="/static/src/brand/uppy-main.png" type="image/x-icon">
    <link rel="stylesheet" href="/static/src/scss/uppy.main.css">
    <link rel="stylesheet" href="/static/src/libs/css/uppy-bs-icons.css">
</head>

<body>

    <header>
        <div class="wrapper">
            <a href="/">
                <div class="logo">
                    <div class="brand-logo">
                        <img src="/static/src/brand/uppy-main.png" alt="Uppy">
                    </div>
                    <div class="brand-name">
                        Uppy
                    </div>
                </div>
            </a>
            <div class="searchBarWrapper">
                <div class="searchBar-input">
                    <input id="search-content" name="search-content" type="text" placeholder="Search Your Files!!">
                </div>
                <span class="shortcut">
                    <div class="key ls">ctrl</div>
                    <span>+</span>
                    <div class="key">/</div>
                </span>
                <div class="search-btn">
                    <button type="submit">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </div>
            <div class="right-cont">
                <div class="toggle-theme">
                    <div class="outer-shell">
                        <div class="inner-toggler">
                            <div class="icon-theme">
                                <div class="icon-t">
                                    <svg class="light" fill="#0aa5a5" xmlns="http://www.w3.org/2000/svg"
                                        viewBox="0 0 512 512">
                                        <path
                                            d="M256 118a22 22 0 01-22-22V48a22 22 0 0144 0v48a22 22 0 01-22 22zM256 486a22 22 0 01-22-22v-48a22 22 0 0144 0v48a22 22 0 01-22 22zM369.14 164.86a22 22 0 01-15.56-37.55l33.94-33.94a22 22 0 0131.11 31.11l-33.94 33.94a21.93 21.93 0 01-15.55 6.44zM108.92 425.08a22 22 0 01-15.55-37.56l33.94-33.94a22 22 0 1131.11 31.11l-33.94 33.94a21.94 21.94 0 01-15.56 6.45zM464 278h-48a22 22 0 010-44h48a22 22 0 010 44zM96 278H48a22 22 0 010-44h48a22 22 0 010 44zM403.08 425.08a21.94 21.94 0 01-15.56-6.45l-33.94-33.94a22 22 0 0131.11-31.11l33.94 33.94a22 22 0 01-15.55 37.56zM142.86 164.86a21.89 21.89 0 01-15.55-6.44l-33.94-33.94a22 22 0 0131.11-31.11l33.94 33.94a22 22 0 01-15.56 37.55zM256 358a102 102 0 11102-102 102.12 102.12 0 01-102 102z" />
                                    </svg>
                                </div>
                                <div class="icon-t">
                                    <svg fill="#8eaeb0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                                        <path
                                            d="M264 480A232 232 0 0132 248c0-94 54-178.28 137.61-214.67a16 16 0 0121.06 21.06C181.07 76.43 176 104.66 176 136c0 110.28 89.72 200 200 200 31.34 0 59.57-5.07 81.61-14.67a16 16 0 0121.06 21.06C442.28 426 358 480 264 480z" />
                                    </svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="toggle-menu menu">
                    <svg xmlns="http://www.w3.org/2000/svg" class="menu" viewBox="0 0 512 512">
                        <path fill="none" stroke="#006c66" stroke-linecap="round" stroke-miterlimit="10"
                            stroke-width="48" d="M88 152h336M88 256h336M88 360h336" />
                    </svg>
                </div>
                <div class="your-profile" id="profile-dropdown-toggle">
                    <div class="profile-img-box">
                        <img src="/static/assets/prf-sm.jpeg" alt="user">
                    </div>
                </div>
            </div>
        </div>

        <!-- future projects -->

        <div class="dropdown" id="profile-dropdown" isOpen="closed">
            <ul>
                <li>
                    <a href="#" class="use link-profile-nav">
                        <div class="icon-action use">
                            <i class="bi bi-graph-up"></i>
                        </div>
                        <span class="action-name use">Usage</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="prfle link-profile-nav">
                        <div class="icon-action prfle">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <span class="action-name prfle">Profile</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="sett link-profile-nav">
                        <div class="icon-action sett">
                            <i class="bi bi-gear-wide-connected"></i>
                        </div>
                        <span class="action-name sett">Settings</span>
                    </a>
                </li>
                <hr>
                <li>
                    <a href="#" class="lout link-profile-nav">
                        <div class="icon-action lout">
                            <i class="bi bi-box-arrow-right"></i>
                        </div>
                        <span class="action-name lout">Log Out</span>
                    </a>
                </li>
            </ul>
        </div>

        <nav></nav>

    </header>

    <main></main>

    <footer></footer>


    <!-- Scripts and libraries -->
    <script src="/static/src/libs/js/code.jquery.com_jquery-3.7.0.js"></script>

    <script>
        $('.outer-shell').click(function () {
            $('.inner-toggler').toggleClass('dark');
            $('.icon-theme').toggleClass('dark');

            if (!$('body').attr('data-uppy-theme') || $('body').attr('data-uppy-theme') == 'light') {
                $('body').attr('data-uppy-theme', 'dark');
            } else {
                $('body').attr('data-uppy-theme', 'light');
            }

        })
    </script>
    <script>
        $(document).ready(function () {
            $(document).keydown(function (e) {
                if (e.ctrlKey && e.key === '/') {
                    $("#search-content").focus();
                    e.preventDefault();
                }
                if (e.key === 'Escape') {
                    $("#search-content").blur();
                    e.preventDefault();
                }
            });

            $("#search-content").focus(function () {
                $(".searchBarWrapper").addClass("focus");
                $(".shortcut").addClass("focus");
            });

            $("#search-content").blur(function () {
                $(".searchBarWrapper").removeClass("focus");
                $(".shortcut").removeClass("focus");
            });
        });
    </script>
    <!-- <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script> -->
    <!-- tooltips -->
    <script src="/static/src/libs/js/popper.min.js"></script>
    <script src="/static/src/libs/js/gsap.min.js"></script>
    <!-- <script src="https://unpkg.com/tippy.js@5/dist/tippy-bundle.iife.js"></script> -->.
    <script>
        const button = document.querySelector('#profile-dropdown-toggle');
        const tooltip = document.querySelector('#profile-dropdown');

        Popper.createPopper(button, tooltip, {
            placement: 'bottom-start',
            modifiers: [
                {
                    name: 'offset',
                    options: {
                        offset: [0, 10],
                    },
                }
            ],
        });

        $(document).ready(function () {
        // Set initial state
        $('#profile-dropdown').attr('isOpen', 'closed').hide();

        function closeDropdown() {
            $('#profile-dropdown').attr('isOpen', 'closed').stop(true, true).slideUp(300).fadeOut(300);
        }

        $('.link-profile-nav').click(function(){closeDropdown()});

        // Click event
        $('#profile-dropdown-toggle').click(function () {
            const isOpen = $('#profile-dropdown').attr('isOpen');
            if (isOpen === "closed") {
                $('#profile-dropdown').attr('isOpen', 'opened').stop(true, true).slideDown(300).fadeIn(300);
            } else if (isOpen === "opened") {
                $('#profile-dropdown').attr('isOpen', 'closed').stop(true, true).slideUp(300).fadeOut(300);
            }
        });
    });

    </script>




    {% block customScripts %}{% endblock customScripts %}

</body>

</html>
