<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uppy | {% block title %}{% endblock title %} </title>
    <link rel="shortcut icon" href="/static/src/brand/uppy-main.png" type="image/x-icon">
    <link rel="stylesheet" href="/static/src/scss/main.css">
</head>
<body>

    <header>
        <div class="wrapper">
            <div class="logo">
                <div class="brand-logo">
                    <img src="/static" alt="">
                </div>
                <div class="brand-name">
                    Uppy
                </div>
            </div>
            <div class="searchBarWrapper">
                <div class="searchBar-input">
                    <input type="text" placeholder="Search Your Files!!">
                </div>
                <span class="shortcut">
                    <code>
                        <div class="key">ctrl</div>
                        <span>+</span>
                        <div class="key">/</div>
                    </code>
                </span>
                <div class="search-btn">
                    <button type="submit">Search</button>
                </div>
            </div>
            <div class="right-cont">
                <div class="toggle-theme"></div>
                <div class="toggle-menu"></div>
                <div class="your-profile"></div>
            </div>
        </div>

        <nav></nav>
    </header>
    <main></main>
    <footer></footer>
    
</body>
</html>
